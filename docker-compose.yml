version: "3.9"

services:
  db:
    image: mongo:6
    container_name: cms_db
    environment:
      MONGO_INITDB_DATABASE: cms_db
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - cms_network
    healthcheck:
      test: ["CMD-SHELL", "mongosh --eval 'db.runCommand(\"ping\").ok' localhost:27017/test --quiet"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cms_redis
    ports:
      - "6379:6379"
    networks:
      - cms_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cms_api
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      MONGO_URI: ${MONGO_URI:-mongodb://db:27017/cms_db}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-super_secret_jwt_key_change_in_production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cms_network
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: cms_worker
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      MONGO_URI: ${MONGO_URI:-mongodb://db:27017/cms_db}
      REDIS_URL: redis://redis:6379
      WORKER_INTERVAL_MS: ${WORKER_INTERVAL_MS:-60000}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cms_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    container_name: cms_frontend
    ports:
      - "5173:80"
    depends_on:
      - api
    networks:
      - cms_network
    restart: unless-stopped

volumes:
  mongo_data:
  uploads_data:

networks:
  cms_network:
    driver: bridge
